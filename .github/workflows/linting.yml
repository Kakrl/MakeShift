name: Linting

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements.txt'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements.txt'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 backend/src tests

      - name: Run isort
        run: isort --check-only backend/src tests

      - name: Run mypy
        run: mypy backend/src --check-untyped-defs